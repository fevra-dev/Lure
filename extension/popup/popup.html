<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LURE | PhishOps Detection Suite</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Liberation Mono', monospace;
      --bg-shell: #2a3035;
      --bg-panel: #1e2226;
      --bg-stats: #24292e;
      --border: #3b4248;
      --text-primary: #d1c7b1;
      --text-muted: #8a9299;
      --text-dim: #646a70;
      --accent-olive: #8b9e73;
      --accent-bronze: #b59a6d;
      --accent-red: #c25e5e;
      --accent-cyan: #7ec4cf;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      height: 640px;
      background: transparent;
      font-family: var(--font-sans);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .shell {
      width: 100%;
      height: 100%;
      background: var(--bg-shell);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 16px;
      border: 1px solid var(--border);
      position: relative;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.9);
      line-height: 1.1;
    }

    .brand-subtitle {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }

    /* ── Toggle ─────────────────────────────── */
    .toggle-wrap {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 16px;
    }

    .toggle-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      display: block;
      width: 100%;
      height: 100%;
      background: #4a5157;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .toggle-input:checked + .toggle-track {
      background: var(--accent-olive);
    }

    .toggle-dot {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #e5e0d8;
      border-radius: 50%;
      transition: transform 0.3s;
      pointer-events: none;
    }

    .toggle-input:checked ~ .toggle-dot {
      transform: translateX(16px);
    }

    /* ── Canvas Area ────────────────────────── */
    .viz-area {
      flex-grow: 1;
      background: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
      margin-bottom: 16px;
    }

    .viz-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .scan-line {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--accent-olive), transparent);
      opacity: 0.2;
    }

    .sentinel-indicator {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.6;
    }

    .sentinel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 8px var(--accent-cyan);
      animation: pulse-sentinel 3s infinite ease-in-out;
    }

    .sentinel-label {
      font-size: 7px;
      letter-spacing: -0.02em;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    @keyframes pulse-sentinel {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }

    /* ── Stats Bar ──────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-stats);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 12px 16px;
      margin-bottom: 12px;
    }

    .stat-col {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .stat-col + .stat-col {
      padding-left: 20px;
    }

    .stat-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
      flex-shrink: 0;
    }

    .stat-label {
      font-size: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .stat-label-total { color: var(--text-muted); }
    .stat-label-high { color: var(--accent-bronze); }
    .stat-label-critical { color: var(--accent-red); }

    .stat-value {
      font-size: 20px;
      font-family: var(--font-mono);
      line-height: 1;
    }

    .stat-value-total { color: var(--text-primary); }
    .stat-value-high { color: var(--accent-bronze); }
    .stat-value-critical { color: var(--accent-red); }

    @keyframes text-flash {
      0% { text-shadow: 0 0 8px currentColor; }
      100% { text-shadow: none; }
    }

    .stat-updated {
      animation: text-flash 0.5s ease-out;
    }

    /* ── Action Bar ─────────────────────────── */
    .action-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .action-btn {
      flex: 1;
      background: var(--bg-stats);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .action-btn:hover {
      background: #2d3439;
      border-color: var(--accent-bronze);
    }

    .action-btn-danger:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    /* ── Events List ────────────────────────── */
    .events-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 12px;
      height: 180px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .events-panel::-webkit-scrollbar { width: 6px; }
    .events-panel::-webkit-scrollbar-track { background: transparent; }
    .events-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .events-empty {
      color: var(--text-dim);
      text-align: center;
      padding: 24px 8px;
      font-size: 10px;
    }

    .event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-bottom: 1px solid rgba(59, 66, 72, 0.4);
      cursor: pointer;
      transition: background-color 0.12s;
    }

    .event-row:hover {
      background: rgba(139, 158, 115, 0.05);
    }

    .event-row:last-child { border-bottom: none; }

    .event-sev {
      display: inline-block;
      min-width: 56px;
      text-align: center;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .event-sev-critical { background: rgba(194, 94, 94, 0.2); color: var(--accent-red); }
    .event-sev-high     { background: rgba(181, 154, 109, 0.2); color: var(--accent-bronze); }
    .event-sev-medium   { background: rgba(126, 196, 207, 0.15); color: var(--accent-cyan); }
    .event-sev-low      { background: rgba(139, 158, 115, 0.15); color: var(--accent-olive); }

    .event-detector {
      flex: 1;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-domain {
      color: var(--text-muted);
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time {
      color: var(--text-dim);
      font-size: 9px;
    }

    .event-detail {
      background: rgba(0, 0, 0, 0.25);
      border-left: 2px solid var(--accent-bronze);
      padding: 8px 10px;
      margin: 2px 4px 6px 4px;
      font-size: 9px;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .event-detail-key {
      color: var(--text-muted);
      display: inline-block;
      min-width: 110px;
    }

    /* ── Footer ─────────────────────────────── */
    .footer {
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
    }

    .telemetry-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .telemetry-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-olive);
      transition: background-color 0.3s;
    }
  </style>
</head>
<body>

  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none" stroke="#b59a6d" stroke-width="2">
          <path d="M 20 50 C 20 70, 40 70, 40 50 L 40 30" stroke-linecap="round"/>
          <path d="M 35 45 L 40 50" stroke-linecap="round"/>
          <circle cx="40" cy="30" r="3" fill="none"/>
          <path d="M 40 40 L 70 30" stroke-width="1" opacity="0.6"/>
          <path d="M 40 40 L 75 45" stroke-width="1" opacity="0.6"/>
          <path d="M 40 40 L 65 55" stroke-width="1" opacity="0.6"/>
        </svg>
        <div>
          <div class="brand-title">LURE</div>
          <div class="brand-subtitle">PhishOps Detection Suite</div>
        </div>
      </div>

      <div class="toggle-wrap">
        <input type="checkbox" id="activeToggle" class="toggle-input" checked>
        <label for="activeToggle" class="toggle-track"></label>
        <div class="toggle-dot"></div>
      </div>
    </header>

    <!-- Visualization Canvas -->
    <div class="viz-area">
      <canvas id="lureCanvas"></canvas>
      <div class="scan-line"></div>
      <div class="sentinel-indicator">
        <div class="sentinel-dot"></div>
        <span class="sentinel-label">SENTINEL</span>
      </div>
    </div>

    <!-- Detection Statistics -->
    <div class="stats-bar">
      <div class="stat-col">
        <span class="stat-label stat-label-total">TOTAL INGESTED</span>
        <span class="stat-value stat-value-total" id="totalCount">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-col">
        <span class="stat-label stat-label-high">HIGH</span>
        <span class="stat-value stat-value-high" id="highCount">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-col">
        <span class="stat-label stat-label-critical">CRITICAL</span>
        <span class="stat-value stat-value-critical" id="criticalCount">0</span>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <button class="action-btn" id="exportJsonBtn" type="button">Export JSON</button>
      <button class="action-btn" id="exportCsvBtn" type="button">Export CSV</button>
      <button class="action-btn action-btn-danger" id="clearOldBtn" type="button" title="Clear events older than 7 days">Clear &gt;7d</button>
      <button class="action-btn action-btn-danger" id="clearAllBtn" type="button">Clear All</button>
    </div>

    <!-- Recent Events List -->
    <div class="events-panel" id="eventsPanel">
      <div class="events-empty">No events captured yet.</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="telemetry-status">
        <div class="telemetry-dot" id="telemetryDot"></div>
        <span id="telemetryText">TELEMETRY: ROUTING</span>
      </div>
      <div>
        <span id="footerInfo">v1.0.0 | 49 DETECTORS ACTIVE</span>
      </div>
    </footer>

  </div>

  <script type="module" src="../lib/event_export.js"></script>
  <script src="popup.js"></script>
</body>
</html>
